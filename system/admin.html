<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>STEP HUB 管理画面</title>
<style>
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Hiragino Sans","Yu Gothic",sans-serif;background:#f5f8fb;margin:0;color:#233043}
.wrap{max-width:760px;margin:0 auto;padding:18px}
h1{font-size:24px}
.box{background:#fff;border:1px solid #d9e6f2;border-radius:16px;padding:16px;margin-bottom:14px}
label{font-weight:700;display:block;margin:12px 0 6px}
input,textarea,select{width:100%;padding:10px;border:1px solid #cfd8e3;border-radius:10px;font-size:15px}
textarea{min-height:130px}
.row{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.checks label{font-weight:400;display:inline-block;margin:6px 14px 6px 0}
button{background:#1f6fb2;color:white;border:0;border-radius:12px;padding:12px 18px;font-size:16px;font-weight:700}
.note{font-size:13px;color:#667085;line-height:1.6}
</style>
</head>
<body>
<div class="wrap">
<h1>STEP HUB 管理画面</h1>
<div class="box">
<p class="note">最初はGoogleスプレッドシートに直接入力する方式で十分です。この画面は次段階でGASと接続します。</p>
<label>タイトル</label><input placeholder="例：公開模試の締切について">
<label>本文</label><textarea placeholder="保護者向け本文"></textarea>
<div class="row">
<div><label>掲載日</label><input type="date"></div>
<div><label>重要度</label><select><option>通常</option><option>重要</option><option>緊急</option></select></div>
</div>
<label>対象</label>
<div class="checks">
<label><input type="checkbox"> 全員</label>
<label><input type="checkbox"> 神領校</label>
<label><input type="checkbox"> 大手町校</label>
<label><input type="checkbox"> 小学生</label>
<label><input type="checkbox"> 中学生</label>
<label><input type="checkbox"> 高校生</label>
</div>
<label>詳細URL / PDF URL</label><input placeholder="https://...">
<label>通知方法</label>
<div class="checks">
<label><input type="checkbox"> ポータル掲載</label>
<label><input type="checkbox"> LINE配信</label>
<label><input type="checkbox"> メール送信</label>
</div>
<button type="button">送信・掲載</button>
</div>
</div>
</body>
</html>
