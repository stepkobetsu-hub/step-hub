<!doctype html>
<html lang="ja">
<head>

<body>
  <header class="site-header">

      <h1>🛡️ STEP総合管理ポータル</h1>
      <p>権限4の管理者専用。利用・管理・共有用の入口をまとめて確認できます。</p>
      <small id="version"></small>
    </div>
    <nav>
      <a href="https://stepkobetsu-hub.github.io/seiseki-kanri/">スタッフ用アプリへ戻る</a>

    <section id="grid" class="grid"></section>
